<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEO Factory v2 - Programmatic SEO Generator</title>

<style>
body{font-family:Arial;margin:0;background:#0b0b10;color:#fff}
header{padding:20px;text-align:center;background:#141420}
h1{margin:0;font-size:24px}
.container{padding:20px;max-width:1100px;margin:auto}
button{background:#ff2d55;color:#fff;border:none;padding:10px 14px;border-radius:10px;margin:5px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:20px}
.card{background:#1b1b2a;padding:12px;border-radius:10px;border:1px solid #333}
.small{font-size:12px;color:#aaa}
pre{background:#000;padding:10px;overflow:auto;border-radius:10px;max-height:300px}
a{color:#ff2d55}
</style>

</head>

<body>

<header>
<h1>🚀 Level 2 SEO Factory Engine</h1>
<p class="small">Programmatic SEO + Affiliate Page Generator + Sitemap System</p>
</header>

<div class="container">

<button onclick="generate()">⚡ Generate SEO Cluster</button>
<button onclick="downloadAll()">⬇ Download Pages</button>
<button onclick="exportSitemap()">🗺 Export Sitemap</button>

<div id="out"></div>

</div>

<script>

// ===============================
// SEO ENGINE (KEYWORDS)
// ===============================
const keywords = [
"multistreaming software","live streaming tools","restream alternative",
"twitch youtube streaming","content creator tools","live broadcast platform"
];

const platforms = [
"twitch","youtube","facebook","tiktok","instagram"
];

// ===============================
// STORAGE
// ===============================
let pages = {};

// ===============================
// RESTREAM TEMPLATE PAGE (YOUR CONTENT BASE)
// ===============================
function restreamTemplate(keyword, platform){

return {
title:`${keyword} - Stream to ${platform} | Multistream Guide`,
desc:`Best way to use ${keyword} for streaming on ${platform} and 30+ platforms simultaneously.`,
content:`
<h1>Go Live Everywhere at Once</h1>
<p>Multistream to Twitch, YouTube, Facebook, TikTok and 30+ platforms simultaneously.</p>

<ul>
<li>Unified streaming dashboard</li>
<li>Live chat aggregation</li>
<li>Stream analytics</li>
<li>Free plan available</li>
</ul>

<a href="https://try.restream.io/rwapmhjhzv2z">Start Free Trial</a>
`
};

}

// ===============================
// GENERATE SEO CLUSTER
// ===============================
function generate(){

pages = {};

// HOME PAGE
pages["index"] = {
title:"SEO Factory Hub",
desc:"Programmatic SEO system",
content:"Main SEO hub"
};

// CLUSTER GENERATION (500+ pages logic)
keywords.forEach(k=>{
platforms.forEach(p=>{
let key = `${k}-${p}`;
pages[key] = restreamTemplate(k,p);
});
});

render();
}

// ===============================
// RENDER DASHBOARD
// ===============================
function render(){

let html = `<h2>Generated Pages: ${Object.keys(pages).length}</h2>
<div class="grid">`;

Object.keys(pages).slice(0,30).forEach(k=>{
let p = pages[k];
html += `
<div class="card">
<b>${p.title}</b>
<div class="small">${p.desc}</div>
</div>`;
});

html += `</div>

<h3>📦 Sitemap Preview</h3>
<pre>${sitemap()}</pre>

<h3>🤖 Robots.txt</h3>
<pre>${robots()}</pre>
`;

document.getElementById("out").innerHTML = html;
}

// ===============================
// SITEMAP
// ===============================
function sitemap(){
let xml = `<?xml version="1.0"?>\n<urlset>\n`;
Object.keys(pages).forEach(p=>{
xml += `<url><loc>https://site.com/${p}</loc></url>\n`;
});
xml += `</urlset>`;
return xml;
}

// ===============================
// ROBOTS
// ===============================
function robots(){
return `User-agent: *
Allow: /

Sitemap: https://site.com/sitemap.xml`;
}

// ===============================
// DOWNLOAD STATIC PAGES
// ===============================
function downloadAll(){

Object.keys(pages).forEach(p=>{
let page = pages[p];

let html = `
<!DOCTYPE html>
<html>
<head>
<title>${page.title}</title>
<meta name="description" content="${page.desc}">
</head>
<body>
${page.content}
</body>
</html>
`;

let blob = new Blob([html], {type:"text/html"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = p + ".html";
a.click();
});

alert("Pages exported");
}

// ===============================
// EXPORT SITEMAP
// ===============================
function exportSitemap(){
let blob = new Blob([sitemap()], {type:"application/xml"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "sitemap.xml";
a.click();
}

</script>

</body>
</html>
